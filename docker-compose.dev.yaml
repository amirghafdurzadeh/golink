services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: "production"
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8080"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    restart: always
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  postgres_data:
